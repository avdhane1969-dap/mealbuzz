<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meal Buzz - Mess Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#0d0f14;
      --card:#171b24;
      --line:#2e3748;
      --text:#f5f7fb;
      --muted:#b9c0cc;
      --accent:#ff8a00;
      --accent2:#ffb347;
      --shadow:0 12px 28px rgba(0,0,0,0.22);
    }

    body{
      font-family:'Inter', Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255,138,0,0.08), transparent 24%),
        linear-gradient(180deg,#0b0d12 0%, #121721 100%);
      color:var(--text);
      min-height:100vh;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px;
      background:rgba(13,15,20,0.90);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .topbar-left{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .back{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:44px;
      height:44px;
      padding:0 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      color:#fff;
      font-size:14px;
      font-weight:700;
      box-shadow:0 8px 18px rgba(0,0,0,0.14);
    }

    .brand{
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .brand h1{
      font-family:'Poppins', sans-serif;
      font-size:28px;
      line-height:1;
      letter-spacing:0.2px;
      background:linear-gradient(90deg,#ffffff 0%, #ffdcb3 32%, #ffb347 60%, #ff8a00 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      text-shadow:0 0 24px rgba(255,138,0,0.12);
    }

    .brand p{
      color:#d6dde8;
      font-size:11px;
      margin-top:5px;
      letter-spacing:1.7px;
      text-transform:uppercase;
      font-weight:700;
    }

    .container{
      padding:18px 16px 28px;
      max-width:900px;
      margin:0 auto;
    }

    .card{
      background:rgba(24,29,40,0.56);
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      position:relative;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      pointer-events:none;
    }

    .hero-image{
      width:100%;
      height:270px;
      object-fit:cover;
      display:block;
      position:relative;
      z-index:1;
    }

    .content{
      padding:18px;
      position:relative;
      z-index:1;
    }

    .title-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }

    .title{
      font-family:'Poppins', sans-serif;
      font-size:28px;
      line-height:1.15;
      color:#fff;
    }

    .info-grid{
      display:grid;
      gap:12px;
      margin:14px 0 10px;
    }

    .info-box{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:16px;
      padding:14px;
    }

    .info-label{
      color:#ffbe63;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.7px;
      margin-bottom:6px;
      font-weight:700;
    }

    .info-text{
      color:#dce2ec;
      font-size:14px;
      line-height:1.75;
    }

    .menu-box{
      margin-top:14px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:18px;
      padding:16px;
    }

    .menu-title{
      color:#ffbe63;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.8px;
      margin-bottom:8px;
      font-weight:700;
    }

    .menu{
      line-height:1.8;
      color:#d9e0eb;
      font-size:14px;
      white-space:pre-wrap;
    }

    .btn-group{
      display:grid;
      gap:12px;
      margin-top:16px;
    }

    .btn{
      display:block;
      padding:14px;
      text-align:center;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      color:#fff;
      border-radius:16px;
      text-decoration:none;
      font-size:15px;
      font-weight:800;
      box-shadow:0 14px 28px rgba(255,138,0,0.18);
    }

    .btn.secondary{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:none;
    }

    .btn.disabled{
      opacity:0.6;
      pointer-events:none;
    }

    .not-found{
      text-align:center;
      padding:28px 18px;
      color:var(--muted);
      font-size:15px;
      line-height:1.8;
    }

    @media(min-width:768px){
      .topbar{
        padding:16px 28px;
      }

      .container{
        padding-left:28px;
        padding-right:28px;
      }

      .hero-image{
        height:340px;
      }

      .info-grid{
        grid-template-columns:repeat(2,1fr);
      }

      .btn-group{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media(min-width:1100px){
      .container{
        padding-left:48px;
        padding-right:48px;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="topbar-left">
      <a href="javascript:history.back()" class="back">← Back</a>

      <div class="brand">
        <h1>Meal Buzz</h1>
        <p>Mess details</p>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <img src="thali.jpg" id="image" class="hero-image" alt="Mess image">

      <div class="content">
        <div class="title-row">
          <h2 id="name" class="title">Loading...</h2>
        </div>

        <div class="info-grid">
          <div class="info-box">
            <div class="info-label">Location</div>
            <div class="info-text" id="location">Loading...</div>
          </div>

          <div class="info-box">
            <div class="info-label">Price</div>
            <div class="info-text" id="price">Loading...</div>
          </div>
        </div>

        <div class="menu-box">
          <div class="menu-title">Today Menu</div>
          <div class="menu" id="menu">Loading...</div>
        </div>

        <div class="btn-group">
          <a href="#" id="callBtn" class="btn">Call Now</a>
          <a href="#" id="directionBtn" class="btn secondary">Get Directions</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://iinvhwsbnvmcujyrzlxe.supabase.co";
    const SUPABASE_KEY = "sb_publishable_fwhxfVqWpDrro8hkQbQQRA_1crMexZv";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const messId = params.get("id");

    function getMenuText(mess) {
      return mess.today_menu || mess.menu || "Menu not available";
    }

    function detectMealType(mess) {
      const directType = (mess.type || mess.food_type || "").toString().toLowerCase().trim();
      if (directType.includes("nonveg") || directType.includes("non-veg")) return "nonveg";
      if (directType.includes("veg")) return "veg";

      const text = getMenuText(mess).toLowerCase();

      const nonVegWords = [
        "chicken", "egg", "anda", "mutton", "fish", "keema", "prawn", "biryani", "nonveg", "non-veg"
      ];

      for (const word of nonVegWords) {
        if (text.includes(word)) return "nonveg";
      }

      return "veg";
    }

    function getMessImage(mess) {
      const mealType = detectMealType(mess);

      const manualImage =
        mess.image_url ||
        mess.image ||
        mess.main_image ||
        mess.photo_url ||
        "";

      const vegImage =
        mess.veg_image_url ||
        mess.veg_image ||
        "";

      const nonVegImage =
        mess.nonveg_image_url ||
        mess.nonveg_image ||
        mess.non_veg_image_url ||
        mess.non_veg_image ||
        "";

      if (mealType === "nonveg" && nonVegImage) return nonVegImage;
      if (mealType === "veg" && vegImage) return vegImage;
      if (manualImage) return manualImage;

      return mealType === "nonveg" ? "thali2.jpg" : "thali.jpg";
    }

    loadMess();

    async function loadMess() {
      if (!messId) {
        showNotFound();
        return;
      }

      const { data, error } = await sb
        .from("mess")
        .select("*")
        .eq("id", messId)
        .single();

      if (error || !data) {
        console.log("MESS DETAIL ERROR", error);
        showNotFound();
        return;
      }

      const mess = data;

      document.getElementById("name").innerText =
        mess.name || mess.mess_name || "Mess";

      const address =
        mess.location || mess.address || mess.location_name || "Location not available";

      document.getElementById("location").innerText = address;

      document.getElementById("price").innerText =
        mess.price || mess.price_range || "Price not available";

      document.getElementById("menu").innerText = getMenuText(mess);

      document.getElementById("image").src = getMessImage(mess);

      const callBtn = document.getElementById("callBtn");
      const contact = mess.contact || mess.phone || mess.mobile || "";

      if (contact) {
        callBtn.href = "tel:" + contact;
        callBtn.innerText = "Call Now";
        callBtn.classList.remove("disabled");
      } else {
        callBtn.href = "#";
        callBtn.innerText = "Contact not available";
        callBtn.classList.add("disabled");
      }

      const directionBtn = document.getElementById("directionBtn");
      const lat = Number(mess.latitude || mess.lat);
      const lon = Number(mess.longitude || mess.lon || mess.lng);

      if (!isNaN(lat) && !isNaN(lon)) {
        directionBtn.href = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
        directionBtn.target = "_blank";
        directionBtn.innerText = "Get Directions";
        directionBtn.classList.remove("disabled");
      } else if (address && address !== "Location not available") {
        directionBtn.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
        directionBtn.target = "_blank";
        directionBtn.innerText = "Get Directions";
        directionBtn.classList.remove("disabled");
      } else {
        directionBtn.href = "#";
        directionBtn.innerText = "Direction not available";
        directionBtn.classList.add("disabled");
      }
    }

    function showNotFound() {
      document.querySelector(".content").innerHTML = `
        <div class="not-found">
          <h2 style="margin-bottom:10px;color:#fff;">Mess not found</h2>
          <p>This mess details page is not available right now.</p>
        </div>
      `;
    }
  </script>

</body>
</html>s
