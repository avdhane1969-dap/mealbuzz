<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Buzz Intro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter', sans-serif;
      background:#000;
      color:#fff;
      overflow:hidden;
    }

    .intro-screen{
      position:relative;
      width:100%;
      height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .intro-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:1;
    }

    .overlay{
      position:absolute;
      inset:0;
      z-index:2;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,0.45) 0%,
          rgba(0,0,0,0.18) 28%,
          rgba(0,0,0,0.30) 60%,
          rgba(0,0,0,0.72) 100%);
    }

    .intro-content{
      position:relative;
      z-index:3;
      width:100%;
      max-width:520px;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:36px 22px 28px;
    }

    .top-content{
      margin-top:20px;
    }

    .brand{
      font-family:'Poppins', sans-serif;
      font-size:20px;
      font-weight:800;
      letter-spacing:0.3px;
      margin-bottom:20px;
      color:#fff;
      text-shadow:0 4px 18px rgba(0,0,0,0.35);
    }

    .title{
      font-family:'Poppins', sans-serif;
      font-size:clamp(34px, 6vw, 54px);
      line-height:1.1;
      font-weight:800;
      max-width:92%;
      color:#fff;
      text-shadow:0 6px 24px rgba(0,0,0,0.35);
    }

    .subtitle{
      margin-top:14px;
      font-size:15px;
      line-height:1.7;
      color:rgba(255,255,255,0.92);
      font-weight:500;
      text-shadow:0 4px 18px rgba(0,0,0,0.35);
    }

    .bottom-content{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:22px;
      width:100%;
    }

    .dots{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:rgba(255,255,255,0.75);
      transition:0.25s ease;
      box-shadow:0 4px 14px rgba(0,0,0,0.22);
    }

    .dot.active{
      width:20px;
      height:20px;
      background:#fff;
      box-shadow:0 0 0 7px rgba(255,255,255,0.18);
    }

    .slide-btn{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.96);
      border-radius:999px;
      padding:10px 10px 10px 26px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:0 16px 34px rgba(0,0,0,0.26);
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      transition:transform 0.18s ease;
    }

    .slide-btn:active{
      transform:scale(0.98);
    }

    .slide-text{
      color:#111;
      font-size:20px;
      font-weight:800;
      letter-spacing:0.2px;
      flex:1;
      text-align:center;
      transform:translateX(10px);
    }

    .slide-arrow{
      width:62px;
      height:62px;
      border-radius:50%;
      background:linear-gradient(135deg, #ff7b2c, #d85b24);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:30px;
      font-weight:700;
      box-shadow:0 10px 24px rgba(216,91,36,0.38);
      flex-shrink:0;
      transition:transform 0.25s ease;
    }

    .slide-btn:hover .slide-arrow{
      transform:translateX(4px);
    }

    .hint{
      font-size:13px;
      color:rgba(255,255,255,0.78);
      letter-spacing:0.4px;
    }

    .slide-out{
      animation:slideOut 0.55s ease forwards;
    }

    @keyframes slideOut{
      0%{
        transform:translateX(0);
        opacity:1;
      }
      100%{
        transform:translateX(-100%);
        opacity:0;
      }
    }

    @media (max-width:480px){
      .intro-content{
        padding:28px 18px 24px;
      }

      .brand{
        font-size:18px;
        margin-bottom:18px;
      }

      .subtitle{
        font-size:14px;
      }

      .slide-text{
        font-size:18px;
      }

      .slide-arrow{
        width:58px;
        height:58px;
        font-size:28px;
      }
    }
  </style>
</head>
<body>

  <section class="intro-screen" id="introScreen">
    <video class="intro-video" autoplay muted loop playsinline>
      <source src="intro.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="intro-content">
      <div class="top-content">
        <div class="brand">Meal Buzz</div>

        <h1 class="title">Gharghuti jevan, ata fakt ek tap dur 🍛</h1>

        <p class="subtitle">Simple • Affordable • Daily updated</p>
      </div>

      <div class="bottom-content">
        <div class="dots">
          <span class="dot"></span>
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>

        <div class="slide-btn" onclick="goNext()">
          <span class="slide-text">Explore Meals</span>
          <span class="slide-arrow">›</span>
        </div>

        <div class="hint">Slide feel • Tap to continue</div>
      </div>
    </div>
  </section>

  <script>
    function goNext() {
      const intro = document.getElementById("introScreen");
      intro.classList.add("slide-out");

      setTimeout(() => {
sessionStorage.setItem("fromIntro", "yes");
        window.location.href = "home.html";
      }, 500);
    }
  </script>

</body>
</html>
