<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meal Buzz - Meals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#0d0f14;
      --card:#171b24;
      --card-alt:#1c2330;
      --soft:#222937;
      --line:#2e3748;
      --text:#f5f7fb;
      --muted:#b9c0cc;
      --accent:#ff8a00;
      --accent2:#ffb347;
      --green:#27c26c;
      --shadow:0 12px 28px rgba(0,0,0,0.22);
    }

    body{
      font-family:'Inter', Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255,138,0,0.08), transparent 24%),
        linear-gradient(180deg,#0b0d12 0%, #121721 100%);
      color:var(--text);
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px;
      background:rgba(13,15,20,0.90);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .topbar-left{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .back-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:44px;
      height:44px;
      padding:0 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      color:#fff;
      font-size:14px;
      font-weight:700;
      box-shadow:0 8px 18px rgba(0,0,0,0.14);
    }

    .brand{
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .brand h1{
      font-family:'Poppins', sans-serif;
      font-size:28px;
      line-height:1;
      letter-spacing:0.2px;
      background:linear-gradient(90deg,#ffffff 0%, #ffdcb3 32%, #ffb347 60%, #ff8a00 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      text-shadow:0 0 24px rgba(255,138,0,0.12);
    }

    .brand p{
      color:#d6dde8;
      font-size:11px;
      margin-top:5px;
      letter-spacing:1.7px;
      text-transform:uppercase;
      font-weight:700;
    }

    .search-info-wrap{
      padding:16px 16px 4px;
    }

    .search-info{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      background:rgba(24,29,40,0.56);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:14px 16px;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    .container{
      padding:16px;
      display:grid;
      gap:18px;
    }

    .card{
      display:block;
      color:#fff;
      background:rgba(24,29,40,0.56);
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:var(--shadow);
      transition:transform 0.2s ease, border-color 0.2s ease;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      position:relative;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      pointer-events:none;
    }

    .card:hover{
      transform:translateY(-3px);
      border-color:rgba(255,179,71,0.18);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
      position:relative;
      z-index:1;
    }

    .card-body{
      padding:16px;
      position:relative;
      z-index:1;
    }

    .title-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }

    .mess-name{
      font-size:20px;
      font-weight:800;
      line-height:1.2;
    }

    .menu-label{
      color:#ffbe63;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.7px;
      margin-bottom:6px;
      font-weight:700;
    }

    .menu{
      color:#c7cfdb;
      font-size:14px;
      line-height:1.75;
    }

    .no-result{
      display:none;
      margin:16px;
      padding:18px;
      color:#bfc7d4;
      background:rgba(24,29,40,0.56);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      text-align:center;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    @media(min-width:768px){
      .topbar{
        padding:16px 28px;
      }

      .search-info-wrap,
      .container{
        padding-left:28px;
        padding-right:28px;
      }

      .container{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media(min-width:1100px){
      .search-info-wrap,
      .container{
        padding-left:48px;
        padding-right:48px;
      }

      .container{
        grid-template-columns:repeat(3,1fr);
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="back-btn">← Back</a>

      <div class="brand">
        <h1>Meal Buzz</h1>
        <p>Browse meals and menus</p>
      </div>
    </div>
  </header>

  <div class="search-info-wrap">
    <div class="search-info" id="searchText"></div>
  </div>

  <div class="no-result" id="noResult">
    No mess found 😢
  </div>

  <div class="container" id="mealsContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://iinvhwsbnvmcujyrzlxe.supabase.co";
    const SUPABASE_KEY = "sb_publishable_fwhxfVqWpDrro8hkQbQQRA_1crMexZv";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const search = (params.get("search") || "").trim().toLowerCase();
    const filter = (params.get("filter") || "").trim().toLowerCase();
    const nearby = (params.get("nearby") || "").trim();

    const searchText = document.getElementById("searchText");
    const noResult = document.getElementById("noResult");
    const mealsContainer = document.getElementById("mealsContainer");

    const userLat = parseFloat(sessionStorage.getItem("userLat"));
    const userLon = parseFloat(sessionStorage.getItem("userLon"));
    const locationEnabled = sessionStorage.getItem("locationEnabled") === "yes";

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function getMenuText(mess) {
      return mess.today_menu || mess.menu || "Menu not updated yet";
    }

    function detectMealType(mess) {
      const directType = (mess.type || mess.food_type || "").toString().toLowerCase().trim();
      if (directType.includes("nonveg") || directType.includes("non-veg")) return "nonveg";
      if (directType.includes("veg")) return "veg";

      const text = getMenuText(mess).toLowerCase();

      const nonVegWords = [
        "chicken", "egg", "anda", "mutton", "fish", "keema", "prawn", "biryani", "nonveg", "non-veg"
      ];

      for (const word of nonVegWords) {
        if (text.includes(word)) return "nonveg";
      }

      return "veg";
    }

    function getMessImage(mess) {
      const mealType = detectMealType(mess);

      const manualImage =
        mess.image_url ||
        mess.image ||
        mess.main_image ||
        mess.photo_url ||
        "";

      const vegImage =
        mess.veg_image_url ||
        mess.veg_image ||
        "";

      const nonVegImage =
        mess.nonveg_image_url ||
        mess.nonveg_image ||
        mess.non_veg_image_url ||
        mess.non_veg_image ||
        "";

      if (mealType === "nonveg" && nonVegImage) return nonVegImage;
      if (mealType === "veg" && vegImage) return vegImage;
      if (manualImage) return manualImage;

      return mealType === "nonveg" ? "thali2.jpg" : "thali.jpg";
    }

    function getDistanceText(mess) {
      const lat = Number(mess.latitude || mess.lat);
      const lon = Number(mess.longitude || mess.lng || mess.lon);

      if (
        locationEnabled &&
        !isNaN(userLat) &&
        !isNaN(userLon) &&
        !isNaN(lat) &&
        !isNaN(lon)
      ) {
        const distance = getDistance(userLat, userLon, lat, lon);
        if (!isNaN(distance) && isFinite(distance)) {
          mess.distance = distance;
          return distance.toFixed(1) + " km away";
        }
      }

      return mess.location || mess.address || mess.location_name || "Nearby mess";
    }

    function matchesFilter(mess) {
      const menuText = getMenuText(mess).toLowerCase();
      const mealType = detectMealType(mess);

      if (!filter) return true;

      if (filter === "veg") return mealType === "veg";
      if (filter === "nonveg") return mealType === "nonveg";

      if (filter === "budget") {
        const price = Number(mess.price || mess.price_range || 0);
        return price > 0 ? price <= 100 : true;
      }

      if (filter === "premium") {
        const price = Number(mess.price || mess.price_range || 0);
        return price > 100;
      }

      return menuText.includes(filter) || mealType.includes(filter);
    }

    function createMealCard(mess) {
      const card = document.createElement("a");
      card.className = "card";
      card.href = "mess.html?id=" + encodeURIComponent(mess.id);

      const menuText = getMenuText(mess);
      const imageSrc = getMessImage(mess);
      const distanceText = getDistanceText(mess);

      card.innerHTML = `
        <img src="${imageSrc}" alt="${mess.name || "Mess"}" />
        <div class="card-body">
          <div class="title-row">
            <div class="mess-name">${mess.name || "Mess"}</div>
          </div>
          <div class="menu-label">${distanceText}</div>
          <div class="menu">${menuText}</div>
        </div>
      `;

      mealsContainer.appendChild(card);
    }

    async function loadMeals() {
      const { data, error } = await sb.from("mess").select("*");

      if (error) {
        console.log("MESS ERROR", error);
        searchText.innerText = "Could not load meals right now.";
        noResult.style.display = "block";
        return;
      }

      if (!data || data.length === 0) {
        searchText.innerText = "No mess data found.";
        noResult.style.display = "block";
        return;
      }

      let filtered = [...data];

      if (search) {
        searchText.innerText = "Showing results for: " + search;

        filtered = filtered.filter(mess => {
          const name = (mess.name || "").toLowerCase();
          const menu = getMenuText(mess).toLowerCase();
          const location = (mess.location || mess.address || "").toLowerCase();
          return name.includes(search) || menu.includes(search) || location.includes(search);
        });
      } else if (nearby === "1") {
        if (locationEnabled && !isNaN(userLat) && !isNaN(userLon)) {
          searchText.innerText = "Showing nearby messes based on your location.";

          filtered = filtered.filter(mess => {
            const lat = Number(mess.latitude || mess.lat);
            const lon = Number(mess.longitude || mess.lng || mess.lon);

            if (isNaN(lat) || isNaN(lon)) return false;

            const distance = getDistance(userLat, userLon, lat, lon);
            mess.distance = distance;
            return !isNaN(distance) && distance <= 10;
          });

          filtered.sort((a, b) => (a.distance || 9999) - (b.distance || 9999));
        } else {
          searchText.innerText = "Enable location to see nearby messes.";
          filtered = [];
        }
      } else if (filter) {
        searchText.innerText = "Showing " + filter + " meals.";
        filtered = filtered.filter(matchesFilter);

        if (locationEnabled && !isNaN(userLat) && !isNaN(userLon)) {
          filtered.forEach(mess => {
            const lat = Number(mess.latitude || mess.lat);
            const lon = Number(mess.longitude || mess.lng || mess.lon);

            if (!isNaN(lat) && !isNaN(lon)) {
              mess.distance = getDistance(userLat, userLon, lat, lon);
            }
          });

          filtered.sort((a, b) => (a.distance || 9999) - (b.distance || 9999));
        }
      } else {
        if (locationEnabled && !isNaN(userLat) && !isNaN(userLon)) {
          searchText.innerText = "Showing nearby messes based on your location.";

          filtered.forEach(mess => {
            const lat = Number(mess.latitude || mess.lat);
            const lon = Number(mess.longitude || mess.lng || mess.lon);

            if (!isNaN(lat) && !isNaN(lon)) {
              mess.distance = getDistance(userLat, userLon, lat, lon);
            }
          });

          filtered.sort((a, b) => (a.distance || 9999) - (b.distance || 9999));
        } else {
          searchText.innerText = "Browse available messes and menus.";
        }
      }

      mealsContainer.innerHTML = "";

      if (filtered.length === 0) {
        noResult.style.display = "block";
        return;
      }

      noResult.style.display = "none";
      filtered.forEach(createMealCard);
    }

    loadMeals();
  </script>

</body>
</html>
