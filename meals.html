<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meal Buzz - Meals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#0d0f14;
      --card:#171b24;
      --card-alt:#1c2330;
      --soft:#222937;
      --line:#2e3748;
      --text:#f5f7fb;
      --muted:#b9c0cc;
      --accent:#ff8a00;
      --accent2:#ffb347;
      --green:#27c26c;
      --shadow:0 12px 28px rgba(0,0,0,0.22);
    }

    body{
      font-family:'Inter', Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255,138,0,0.08), transparent 24%),
        linear-gradient(180deg,#0b0d12 0%, #121721 100%);
      color:var(--text);
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px;
      background:rgba(13,15,20,0.90);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .topbar-left{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .back-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:44px;
      height:44px;
      padding:0 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      color:#fff;
      font-size:14px;
      font-weight:700;
      box-shadow:0 8px 18px rgba(0,0,0,0.14);
    }

    .brand{
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .brand h1{
      font-family:'Poppins', sans-serif;
      font-size:28px;
      line-height:1;
      letter-spacing:0.2px;
      background:linear-gradient(90deg,#ffffff 0%, #ffdcb3 32%, #ffb347 60%, #ff8a00 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      text-shadow:0 0 24px rgba(255,138,0,0.12);
    }

    .brand p{
      color:#d6dde8;
      font-size:11px;
      margin-top:5px;
      letter-spacing:1.7px;
      text-transform:uppercase;
      font-weight:700;
    }

    .search-info-wrap{
      padding:16px 16px 4px;
    }

    .search-info{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      background:rgba(24,29,40,0.56);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:14px 16px;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    .container{
      padding:16px;
      display:grid;
      gap:18px;
    }

    .card{
      display:block;
      color:#fff;
      background:rgba(24,29,40,0.56);
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:var(--shadow);
      transition:transform 0.2s ease, border-color 0.2s ease;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      position:relative;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      pointer-events:none;
    }

    .card:hover{
      transform:translateY(-3px);
      border-color:rgba(255,179,71,0.18);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
      position:relative;
      z-index:1;
    }

    .card-body{
      padding:16px;
      position:relative;
      z-index:1;
    }

    .title-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }

    .mess-name{
      font-size:20px;
      font-weight:800;
      line-height:1.2;
    }

    .rating{
      min-width:62px;
      text-align:center;
      background:rgba(39,194,108,0.12);
      color:#7df0b0;
      border:1px solid rgba(39,194,108,0.28);
      padding:7px 10px;
      border-radius:12px;
      font-size:14px;
      font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .menu-label{
      color:#ffbe63;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.7px;
      margin-bottom:6px;
      font-weight:700;
    }

    .menu{
      color:#c7cfdb;
      font-size:14px;
      line-height:1.75;
    }

    .hidden{
      display:none;
    }

    .no-result{
      display:none;
      margin:16px;
      padding:18px;
      color:#bfc7d4;
      background:rgba(24,29,40,0.56);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      text-align:center;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    @media(min-width:768px){
      .topbar{
        padding:16px 28px;
      }

      .search-info-wrap,
      .container{
        padding-left:28px;
        padding-right:28px;
      }

      .container{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media(min-width:1100px){
      .search-info-wrap,
      .container{
        padding-left:48px;
        padding-right:48px;
      }

      .container{
        grid-template-columns:repeat(3,1fr);
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="back-btn">← Back</a>

      <div class="brand">
        <h1>Meal Buzz</h1>
        <p>Browse meals and menus</p>
      </div>
    </div>
  </header>

  <div class="search-info-wrap">
    <div class="search-info" id="searchText"></div>
  </div>

  <div class="no-result" id="noResult">
    No mess found 😢
  </div>

  <div class="container">

    <a href="mess.html?search=Annapurna%20Mess" class="card" data-name="annapurna mess annapurna" data-menu="chapati rice dal paneer aloo sabji" data-lat="17.6805" data-lon="74.0183">
      <img src="thali.jpg" alt="Annapurna Mess" />
      <div class="card-body">
        <div class="title-row">
          <div class="mess-name">Annapurna Mess</div>
          <div class="rating">4.6 ★</div>
        </div>
        <div class="menu-label">Today Menu</div>
        <div class="menu">Chapati, Rice, Dal, Paneer</div>
      </div>
    </a>

    <a href="mess.html?search=Shiv%20Mess" class="card" data-name="shiv mess shiv" data-menu="bhakri pithla rice dal thecha" data-lat="17.6812" data-lon="74.0195">
      <img src="thali2.jpg" alt="Shiv Mess" />
      <div class="card-body">
        <div class="title-row">
          <div class="mess-name">Shiv Mess</div>
          <div class="rating">4.2 ★</div>
        </div>
        <div class="menu-label">Today Menu</div>
        <div class="menu">Bhakri, Pithla, Rice, Dal</div>
      </div>
    </a>

    <a href="mess.html?search=Gharachi%20Chav" class="card" data-name="gharachi chav gharachi" data-menu="paneer chapati rice sweet dal fry" data-lat="17.6797" data-lon="74.0171">
      <img src="thali.jpg" alt="Gharachi Chav" />
      <div class="card-body">
        <div class="title-row">
          <div class="mess-name">Gharachi Chav</div>
          <div class="rating">4.8 ★</div>
        </div>
        <div class="menu-label">Today Menu</div>
        <div class="menu">Paneer Bhaji, Chapati, Rice, Sweet</div>
      </div>
    </a>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const search = (params.get("search") || "").trim().toLowerCase();

    const cards = document.querySelectorAll(".card");
    const searchText = document.getElementById("searchText");
    const noResult = document.getElementById("noResult");

    const userLat = parseFloat(localStorage.getItem("userLat"));
    const userLon = parseFloat(localStorage.getItem("userLon"));

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    if (!search) {
      if (!isNaN(userLat) && !isNaN(userLon)) {
        searchText.innerText = "Showing nearby messes based on your location.";

        let visibleCount = 0;

        cards.forEach(card => {
          const lat = parseFloat(card.dataset.lat);
          const lon = parseFloat(card.dataset.lon);

          if (isNaN(lat) || isNaN(lon)) {
            card.classList.add("hidden");
            return;
          }

          const distance = getDistance(userLat, userLon, lat, lon);

          if (distance <= 10) {
            card.classList.remove("hidden");
            visibleCount++;
          } else {
            card.classList.add("hidden");
          }
        });

        noResult.style.display = visibleCount === 0 ? "block" : "none";
      } else {
        searchText.innerText = "Please enter a mess name or menu item.";
        cards.forEach(card => card.classList.add("hidden"));
        noResult.style.display = "none";
      }
    } else {
      searchText.innerText = "Showing results for: " + search;

      let visibleCount = 0;

      cards.forEach(card => {
        const name = (card.dataset.name || "").toLowerCase();
        const menu = (card.dataset.menu || "").toLowerCase();

        if (name.includes(search) || menu.includes(search)) {
          card.classList.remove("hidden");
          visibleCount++;
        } else {
          card.classList.add("hidden");
        }
      });

      noResult.style.display = visibleCount === 0 ? "block" : "none";
    }
  </script>

</body>
</html>
